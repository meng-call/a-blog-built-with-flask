{% extends "base.html" %}

{% block title %}Flasky - Confirm your account{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4>确认你的账户</h4>
                </div>
                <div class="card-body">
                    <p>
                        我们已向你发送了一封确认邮件，请查收并点击邮件中的链接确认你的账户。
                    </p>
                    <p>
                        在确认之前，你可以 
                        <a href="{{ url_for('auth.resend_confirmation') }}">重新发送确认邮件</a>。
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
