{% extends "base.html" %}

{% block title %}标签管理{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-10 mx-auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-tags"></i> 标签管理</h2>
            <a href="{{ url_for('main.add_tag') }}" class="btn btn-primary">
                <i class="fas fa-plus"></i> 添加标签
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                {% if tags %}
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>文章数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for tag in tags %}
                        <tr>
                            <td>{{ tag.name }}</td>
                            <td>{{ tag.posts.count() }}</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a href="{{ url_for('main.edit_tag', id=tag.id) }}" class="btn btn-outline-warning">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    {% if tag.posts.count() == 0 %}
                                    <form method="POST" action="{{ url_for('main.delete_tag', id=tag.id) }}" class="d-inline" onsubmit="return confirm('确定要删除吗？');">
                                        <button type="submit" class="btn btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                    {% endif %}
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <div class="text-center py-5">
                    <i class="fas fa-tags fa-3x text-muted mb-3"></i>
                    <p class="text-muted">还没有标签，点击上方按钮添加</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
